[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[functions."lembretes-consulta"]
  schedule = "0 11 * * *"

# Garante que o React Router funcione em qualquer rota direta
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# index.html sempre fresco — evita que o browser sirva URLs de chunks de deploys antigos
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Chunks e assets têm hash no nome — podem ser cacheados para sempre
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
